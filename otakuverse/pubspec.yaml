name: otakuverse
description: "Le réseau social des passionnés d'anime et manga"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: ">=3.38.0"

# ─── LAUNCHER ICONS CONFIG (racine) ──────────────────────────────────
flutter_launcher_icons:
  android:                  true
  ios:                      true
  image_path:               "assets/images/icon.png"
  adaptive_icon_background: "#E01A3C"
  adaptive_icon_foreground: "assets/images/icon_foreground.png"
  image_path_android:       "assets/images/icon.png"
  image_path_ios:           "assets/images/icon.png"
  web:
    generate:         true
    image_path:       "assets/images/icon.png"
    background_color: "#E01A3C"
    theme_color:      "#E01A3C"

# ─── NATIVE SPLASH CONFIG (racine) ───────────────────────────────────
flutter_native_splash:
  color:       "#0A0A0A"
  color_dark:  "#0A0A0A"
  image:       assets/images/splash.png
  image_dark:  assets/images/splash.png
  android_gravity:   center
  ios_content_mode:  center
  fullscreen:        false
  android_12:
    image:                      assets/images/splash.png
    icon_background_color:      "#0A0A0A"
    image_dark:                 assets/images/splash.png
    icon_background_color_dark: "#0A0A0A"
    color:                      "#0A0A0A"
    color_dark:                 "#0A0A0A"
  web: false

dependencies:
  flutter:
    sdk: flutter

  # ============================================
  # CORE
  # ============================================
  supabase_flutter:      ^2.5.11

  # ============================================
  # STATE MANAGEMENT
  # ============================================
  get:                   ^4.6.6

  # ============================================
  # NETWORKING
  # ============================================
  dio:                   ^5.7.0
  connectivity_plus:     ^7.0.0

  # ============================================
  # SPLASH
  # ============================================
  flutter_native_splash: ^2.4.7

  # ============================================
  # LOCAL STORAGE
  # ============================================
  shared_preferences:    ^2.3.2
  flutter_secure_storage: ^10.0.0

  # ============================================
  # IMAGE HANDLING
  # ============================================
  cached_network_image:     ^3.4.1
  image_picker:             ^1.1.2
  photo_view:               ^0.15.0
  flutter_image_compress:   ^2.3.0
  photo_manager: ^3.3.0 
  emoji_picker_flutter: ^3.1.0

  # ============================================
  # Audio
  # ============================================
  just_audio: ^0.9.43 
  visibility_detector: ^0.4.0+2

  # ============================================
  # Vidéo
  # ============================================
  video_player: ^2.9.2

  # ============================================
  # FILE MANAGEMENT
  # ============================================
  file_picker: ^10.3.10
  mime:        ^2.0.0

  # ============================================
  # UI COMPONENTS & ANIMATIONS
  # ============================================
  shimmer:                     ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  smooth_page_indicator:       ^2.0.1
  carousel_slider:             ^5.0.0
  lottie:                      ^3.1.3
  animate_do:                  ^4.2.0
  flutter_slidable:            ^4.0.3
  badges:                      ^3.1.2
  flutter_svg:                 ^2.0.10+1

  # ============================================
  # NOTIFICATIONS PUSH
  # ============================================
  firebase_core:      ^4.4.0
  firebase_messaging: ^16.1.1

  # ============================================
  # PERMISSIONS
  # ============================================
  permission_handler: ^12.0.1

  # ============================================
  # SOCIAL FEATURES
  # ============================================
  share_plus:         ^12.0.1
  url_launcher:       ^6.3.1
  flutter_typeahead:  ^5.2.0

  # ============================================
  # AUTH GOOGLE
  # ============================================
  google_sign_in: ^6.2.1

  # ============================================
  # UTILS
  # ============================================
  timeago:     ^3.7.0
  uuid:        ^4.5.1
  equatable:   ^2.0.5
  collection:  ^1.18.0
  rxdart:      ^0.28.0
  intl:        ^0.20.2

  # ============================================
  # FORMS & VALIDATION
  # ============================================
  flutter_form_builder:   ^10.2.0
  form_builder_validators: ^11.1.2

  # ============================================
  # UI STYLING
  # ============================================
  google_fonts:        ^8.0.1
  flutter_screenutil:  ^5.9.3

  # ============================================
  # MARKDOWN
  # ============================================
  flutter_markdown: ^0.7.4+1

  # ============================================
  # DEEP LINKING
  # ============================================
  app_links: ^6.3.2

  # ============================================
  # ICONS
  # ============================================
  cupertino_icons:     ^1.0.8
  font_awesome_flutter: ^10.7.0
  heroicons_flutter:   ^0.4.0

  # ============================================
  # PAGINATION
  # ============================================
  infinite_scroll_pagination: ^5.1.1

  # ============================================
  # ENV
  # ============================================
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:        ^6.0.0
  build_runner:         ^2.4.13
  mockito:              ^5.4.4
  integration_test:
    sdk: flutter
  # ✅ Ici — dev_dependencies uniquement
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/   # ✅ Décommenté — requis pour icon + splash
    # - assets/icons/
    - assets/logo/
    # - .env

  fonts:
    - family: Bangers        # Titres impact — feel manga
      fonts:
        - asset: assets/fonts/Bangers-Regular.ttf

    - family: Nunito         # Corps de texte — lisible, moderne, doux
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-SemiBold.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
        - asset: assets/fonts/Nunito-ExtraBold.ttf

    - family: JetBrainsMono  # Chiffres, rangs, stats
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf