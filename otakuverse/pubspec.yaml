name: otakuverse
description: "Le réseau social des passionnés d'anime et manga"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter

  # ============================================
  # CORE — Supabase (Auth + DB + Storage + Realtime)
  # ============================================
  supabase_flutter: ^2.5.11

  # ============================================
  # STATE MANAGEMENT
  # ============================================
  get: ^4.6.6

  # ============================================
  # NETWORKING
  # ============================================
  dio: ^5.7.0
  # ⚠️ http supprimé → dio suffit
  connectivity_plus: ^7.0.0

  # ============================================
  # LOCAL STORAGE
  # ============================================
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^10.0.0
  # ⚠️ hive supprimé → shared_preferences suffit pour le MVP
  # ⚠️ path_provider supprimé → non nécessaire sans hive

  # ============================================
  # IMAGE HANDLING
  # ============================================
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  # ⚠️ camera supprimé → image_picker couvre les cas MVP
  photo_view: ^0.15.0
  flutter_image_compress: ^2.3.0
  # ⚠️ image (package) supprimé → flutter_image_compress suffit
  # ⚠️ video_player / video_thumbnail supprimés → feature Shorts (Phase 2)

  # ============================================
  # FILE MANAGEMENT
  # ============================================
  file_picker: ^10.3.10
  mime: ^2.0.0

  # ============================================
  # UI COMPONENTS & ANIMATIONS
  # ============================================
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  # ⚠️ pull_to_refresh supprimé → RefreshIndicator natif Flutter suffit
  smooth_page_indicator: ^2.0.1
  carousel_slider: ^5.0.0
  lottie: ^3.1.3
  animate_do: ^4.2.0
  flutter_slidable: ^4.0.3
  badges: ^3.1.2
  flutter_svg: ^2.0.10+1

  # ============================================
  # NOTIFICATIONS PUSH
  # ============================================
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^20.0.0

  # ============================================
  # PERMISSIONS
  # ============================================
  permission_handler: ^12.0.1

  # ============================================
  # SOCIAL FEATURES
  # ============================================
  share_plus: ^12.0.1
  url_launcher: ^6.3.1
  flutter_typeahead: ^5.2.0

  # ============================================
  # AUTHENTIFICATION GOOGLE
  # ============================================
  google_sign_in: ^6.2.1

  # ============================================
  # UTILS & HELPERS
  # ============================================
  timeago: ^3.7.0
  uuid: ^4.5.1
  equatable: ^2.0.5
  collection: ^1.18.0
  rxdart: ^0.28.0

  # ============================================
  # FORMS & VALIDATION
  # ============================================
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.1.2

  # ============================================
  # UI STYLING
  # ============================================
  google_fonts: ^8.0.1
  flutter_screenutil: ^5.9.3

  # ============================================
  # MARKDOWN (affichage des posts enrichis)
  # ============================================
  flutter_markdown: ^0.7.4+1

  # ============================================
  # DEEP LINKING
  # ============================================
  app_links: ^6.3.2

  # ============================================
  # ICONS
  # ============================================
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0
  # ⚠️ heroicons supprimé → doublon avec heroicons_flutter
  heroicons_flutter: ^0.4.0

  # ============================================
  # PAGINATION
  # ============================================
  infinite_scroll_pagination: ^5.1.1

  # ============================================
  # ENV
  # ============================================
  flutter_dotenv: ^6.0.0

  # ============================================
  # AUDIO (Phase 2 — décommenter quand Shorts actif)
  # ============================================
  # just_audio: ^0.10.5
  # audioplayers: ^6.1.0

  # ============================================
  # MAPS & LOCALISATION (Phase 3 — Events)
  # ============================================
  # google_maps_flutter: ^2.9.0
  # geolocator: ^14.0.2
  # geocoding: ^4.0.0

  # ============================================
  # FEATURES AVANCÉES (Phase 3+)
  # ============================================
  # qr_flutter: ^4.1.0
  # mobile_scanner: ^5.0.0
  # local_auth: ^3.0.0
  # in_app_update: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/logo/
    - .env

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter_18pt-Regular.ttf

# ============================================
# PACKAGES SUPPRIMÉS (MVP)
# ============================================
# http             → doublon avec dio
# hive             → overkill pour MVP, shared_preferences suffit
# hive_flutter     → idem
# hive_generator   → idem
# path_provider    → plus nécessaire sans hive
# camera           → image_picker couvre tous les cas MVP
# video_player     → Phase 2 (Shorts)
# video_thumbnail  → Phase 2 (Shorts)
# image (package)  → flutter_image_compress suffit
# pull_to_refresh  → RefreshIndicator natif Flutter suffit
# just_audio       → Phase 2 (Shorts)
# audioplayers     → Phase 2 (Shorts) + doublon just_audio
# google_maps_flutter → Phase 3 (Events)
# geolocator       → Phase 3 (Events)
# geocoding        → Phase 3 (Events)
# qr_flutter       → Phase 3+
# mobile_scanner   → Phase 3+
# local_auth       → Phase 3+
# in_app_update    → Phase 3+
# heroicons        → doublon heroicons_flutter